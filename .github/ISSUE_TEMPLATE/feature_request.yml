name: Feature request
description: Suggest a new rule, workflow, example, or documentation improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Use this template for non-sensitive improvements. For security concerns, follow SECURITY.md instead.
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
      placeholder: Describe the requested rule, workflow, example, or documentation update.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem it solves
      description: What gap or repeated failure does this address?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Skill activation
        - Rule routing
        - Java backend
        - Maven or environment discovery
        - Python
        - Vue or React
        - Mini Program
        - Delivery templates
        - README or examples
        - Other
    validations:
      required: true
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility and boundaries
      description: What should not change?
      placeholder: Activation boundaries, public wording, README sync, or unaffected stacks.
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: This request does not include secrets, tokens, private paths, production URLs, or customer data.
          required: true
        - label: I checked whether this belongs in an existing reference before proposing a new section.
          required: false
