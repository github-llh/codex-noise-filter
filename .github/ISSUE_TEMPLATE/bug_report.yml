name: Bug report
description: Report incorrect behavior, missing activation, or broken documentation.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Keep private paths, secrets, tokens, production URLs, and customer data out of public issues.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What went wrong?
      placeholder: Describe the incorrect behavior or broken documentation.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Include minimal logs, prompts, file paths, or screenshots after removing sensitive data.
      placeholder: Command, prompt, affected file, or relevant excerpt.
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Skill activation
        - Rule routing
        - Reference content
        - README or examples
        - Templates
        - Other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Codex surface, project type, and relevant versions if known.
      placeholder: Codex App / CLI / IDE, OS, project stack, relevant tool versions.
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I removed secrets, tokens, private hostnames, production URLs, and customer data.
          required: true
        - label: I searched existing issues or pull requests for a similar report.
          required: false
